document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ном внутреннем напряжении и чувствует, что организм больше не справляется самостоятельно. Мягкая работа с телом, которая возвращает ощущение безопасности.<\u002Fp>\n      <div style=\"display:flex;gap:14px;align-items:center;flex-wrap:wrap\">\n        <a href=\"https://wa.me/905368726735\" target=\"_blank\" style=\"text-decoration:none;background:{{ btnBg }};color:#fff;padding:15px 28px;border-radius:100px;font-size:15px;font-weight:600\">Записаться на сеанс<\u002Fa>\n        <span style=\"font-size:14px;color:oklch(50% 0.01 240)\">12 000 ₽ · 1 час<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"781ff29e-88d3-4c63-a49c-f88c4f0fda86\" alt=\"Сеанс биодинамики\" style=\"aspect-ratio:4/5;border-radius:24px;object-fit:cover;width:100%\">\n\n  <\u002Fsection>\n\n  <!-- КОМУ ПОДХОДИТ -->\n  <section style=\"padding:48px 0\" data-screen-label=\"Кому подходит\">\n    <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 8px\">Кому показаны сеансы<\u002Fh2>\n    <p style=\"font-size:16px;color:oklch(45% 0.01 240);margin:0 0 28px;max-width:640px\">Для людей, которые живут в постоянном внутреннем напряжении и чувствуют, что организм больше не справляется самостоятельно.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px\">\n      <sc-for list=\"{{ forWhomItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;background:oklch(97% 0.008 180);border:1px solid oklch(92% 0.01 180);border-radius:14px;padding:18px 20px\">\n          <div style=\"width:22px;height:22px;flex:none;border-radius:50%;background:{{ tagBg }};display:flex;align-items:center;justify-content:center;margin-top:1px\">\n            <div style=\"width:7px;height:11px;border-right:2px solid {{ tagText }};border-bottom:2px solid {{ tagText }};transform:rotate(45deg) translate(-1px,-2px)\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:15.5px;line-height:1.5;color:oklch(30% 0.01 240)\">{{ item }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- СИТУАЦИИ-ТРИГГЕРЫ -->\n  <section style=\"padding:48px 0;background:oklch(96% 0.015 165);border-radius:28px;margin:8px 0\" data-screen-label=\"Ситуации-триггеры\">\n    <div style=\"padding:40px 40px 44px\">\n      <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 28px\">В каких ситуациях подходит продукт<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n        <sc-for list=\"{{ triggerItems }}\" as=\"item\" hint-placeholder-count=\"9\">\n          <div style=\"background:#fff;border-radius:14px;padding:18px;font-size:14.5px;line-height:1.5;color:oklch(32% 0.01 240)\">{{ item }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ЦИТАТЫ ЦА -->\n  <section style=\"padding:56px 0\" data-screen-label=\"Цитаты ЦА\">\n    <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 8px\">Узнаёте себя?<\u002Fh2>\n    <p style=\"font-size:16px;color:oklch(45% 0.01 240);margin:0 0 28px\">Так о своём состоянии рассказывают люди, которые приходят на сеансы<\u002Fp>\n    <div style=\"columns:3;column-gap:16px\">\n      <sc-for list=\"{{ caQuotes }}\" as=\"q\" hint-placeholder-count=\"9\">\n        <div style=\"break-inside:avoid;background:oklch(97% 0.008 180);border-left:3px solid {{ quoteBorder }};border-radius:4px 14px 14px 4px;padding:16px 18px;margin-bottom:14px;font-size:14.5px;line-height:1.55;color:oklch(30% 0.01 240);font-style:italic\">{{ q }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ФОРМАТ РАБОТЫ -->\n  <section style=\"padding:48px 0\" data-screen-label=\"Формат работы\">\n    <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 32px\">Как проходит работа<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n      <sc-for list=\"{{ formatSteps }}\" as=\"step\" hint-placeholder-count=\"5\">\n        <div style=\"display:grid;grid-template-columns:48px 1fr;gap:20px;padding:22px 0;border-bottom:1px solid oklch(92% 0.008 180)\">\n          <div style=\"width:40px;height:40px;border-radius:50%;background:{{ btnBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px\">{{ step.n }}<\u002Fdiv>\n          <div>\n            <div style=\"font-size:17px;font-weight:700;color:oklch(22% 0.01 240);margin-bottom:6px\">{{ step.title }}<\u002Fdiv>\n            <div style=\"font-size:15px;line-height:1.55;color:oklch(42% 0.01 240)\">{{ step.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ЧТО БУДЕТ ЕСЛИ НЕ РЕШАТЬ -->\n  <section style=\"{{ consequencesSectionStyle }}border-radius:28px;margin:8px 0\" data-screen-label=\"Если не решать\">\n    <div style=\"padding:40px 40px 44px\">\n      <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;margin:0 0 8px\">Что будет, если это не решать<\u002Fh2>\n      <p style=\"font-size:16px;margin:0 0 28px;opacity:0.75\">Если продолжать жить в постоянном внутреннем напряжении<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <sc-for list=\"{{ consequences }}\" as=\"item\" hint-placeholder-count=\"9\">\n          <div style=\"{{ consequenceItemStyle }}border-radius:14px;padding:18px 20px;font-size:15px;line-height:1.6\">{{ item }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- КАРТИНА БУДУЩЕГО -->\n  <section style=\"padding:56px 0\" data-screen-label=\"Картина будущего\">\n    <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 28px\">Как изменится жизнь после сеансов<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px\">\n      <sc-for list=\"{{ futureItems }}\" as=\"item\" hint-placeholder-count=\"10\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:6px 0\">\n          <div style=\"width:6px;height:6px;border-radius:50%;background:{{ btnBg }};margin-top:9px;flex:none\"><\u002Fdiv>\n          <div style=\"font-size:16px;line-height:1.55;color:oklch(28% 0.01 240)\">{{ item }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- РЕЗУЛЬТАТЫ / ОТЗЫВЫ -->\n  <section style=\"padding:48px 0;background:oklch(96% 0.015 165);border-radius:28px;margin:8px 0\" data-screen-label=\"Результаты клиентов\">\n    <div style=\"padding:40px 40px 44px\">\n      <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 28px\">Что говорят клиенты после сеансов<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px\">\n        <sc-for list=\"{{ resultQuotes }}\" as=\"q\" hint-placeholder-count=\"15\">\n          <div style=\"background:#fff;border-radius:14px;padding:16px 18px;font-size:14px;line-height:1.5;color:oklch(30% 0.01 240)\">{{ q }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showCases }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:15px;font-weight:700;color:oklch(24% 0.01 240);margin-bottom:14px\">Кейсы<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <sc-for list=\"{{ caseQuotes }}\" as=\"q\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border-radius:16px;padding:20px;font-size:14.5px;line-height:1.6;color:oklch(28% 0.01 240);border:1px solid oklch(90% 0.01 180)\">{{ q }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ВОЗРАЖЕНИЯ -->\n  <section style=\"padding:48px 0\" data-screen-label=\"Возражения\">\n    <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 28px\">Возможные сомнения<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <sc-for list=\"{{ objections }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <div style=\"border:1px solid oklch(90% 0.01 180);border-radius:14px;overflow:hidden;background:#fff\">\n          <div sc-camel-on-click=\"{{ item.toggle }}\" style=\"padding:18px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:16px\">\n            <div style=\"font-size:15.5px;font-weight:600;color:oklch(26% 0.01 240);font-style:italic\">{{ item.q }}<\u002Fdiv>\n            <div style=\"font-size:20px;color:{{ tagText }};flex:none\">{{ item.sign }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ item.open }}\">\n            <div style=\"padding:0 20px 20px;font-size:14.5px;line-height:1.6;color:oklch(38% 0.01 240)\">{{ item.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section style=\"padding:48px 0\" data-screen-label=\"Частые вопросы\">\n    <h2 style=\"font-size:30px;font-weight:700;letter-spacing:-0.01em;color:oklch(20% 0.01 240);margin:0 0 28px\">Частые вопросы<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"10\">\n        <div style=\"border-bottom:1px solid oklch(90% 0.01 180)\">\n          <div sc-camel-on-click=\"{{ item.toggle }}\" style=\"padding:18px 4px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:16px\">\n            <div style=\"font-size:16px;font-weight:600;color:oklch(24% 0.01 240)\">{{ item.q }}<\u002Fdiv>\n            <div style=\"font-size:22px;color:{{ tagText }};flex:none\">{{ item.sign }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ item.open }}\">\n            <div style=\"padding:0 4px 20px;font-size:15px;line-height:1.6;color:oklch(38% 0.01 240);max-width:760px\">{{ item.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ЦЕНА -->\n  <section id=\"pricing\" style=\"padding:56px 0 80px\" data-screen-label=\"Цена и запись\">\n    <div style=\"background:{{ btnBg }};border-radius:28px;padding:52px 48px;display:grid;grid-template-columns:1.2fr 0.8fr;gap:32px;align-items:center\">\n      <div>\n        <h2 style=\"font-size:28px;font-weight:700;color:#fff;margin:0 0 12px\">Готовы вернуть себе спокойствие и здоровье?<\u002Fh2>\n        <p style=\"font-size:15.5px;line-height:1.6;color:#fff;opacity:0.85;margin:0;max-width:480px\">После сеанса в течение недели остаёмся на связи: отслеживаем изменения, состояние и ощущения, отвечаем на вопросы.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:20px;padding:28px;text-align:center\">\n        <div style=\"font-size:34px;font-weight:800;color:oklch(20% 0.01 240)\">12 000 ₽<\u002Fdiv>\n        <div style=\"font-size:14px;color:oklch(48% 0.01 240);margin-bottom:20px\">1 час · очно или дистанционно<\u002Fdiv>\n        <a href=\"https://wa.me/905368726735\" target=\"_blank\" style=\"display:block;text-decoration:none;background:{{ btnBg }};color:#fff;padding:15px 0;border-radius:100px;font-size:15px;font-weight:700\">Записаться на сеанс<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"padding:24px 0 40px;border-top:1px solid oklch(92% 0.008 180);font-size:13px;color:oklch(55% 0.01 240)\">Индивидуальные сеансы биодинамики · очный и дистанционный формат<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#7fae9d&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#7fae9d&quot;, &quot;#8fb6d9&quot;, &quot;#c9a37e&quot;, &quot;#a89bd6&quot;]},\n  &quot;consequencesStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;soft&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;soft&quot;, &quot;contrast&quot;], &quot;section&quot;: &quot;Раздел «Если не решать»&quot;},\n  &quot;showCases&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Кейсы&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    objOpen: {},\n    faqOpen: {}\n  };\n\n  toggleObj(i) {\n    this.setState(s => ({ objOpen: { ...s.objOpen, [i]: !s.objOpen[i] } }));\n  }\n  toggleFaq(i) {\n    this.setState(s => ({ faqOpen: { ...s.faqOpen, [i]: !s.faqOpen[i] } }));\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#7fae9d';\n    const consequencesStyle = this.props.consequencesStyle ?? 'soft';\n    const showCases = this.props.showCases ?? true;\n\n    const btnBg = `color-mix(in srgb, ${accent} 60%, black)`;\n    const tagBg = `color-mix(in srgb, ${accent} 22%, white)`;\n    const tagText = `color-mix(in srgb, ${accent} 62%, black)`;\n    const quoteBorder = `color-mix(in srgb, ${accent} 55%, white)`;\n\n    const consequencesSectionStyle = consequencesStyle === 'contrast'\n      ? 'background:#20211f;color:#f2f0ee;'\n      : 'background:oklch(95.5% 0.018 70);color:oklch(20% 0.01 240);';\n    const consequenceItemStyle = consequencesStyle === 'contrast'\n      ? 'background:#2c2d2b;'\n      : 'background:#fff;';\n\n    const forWhomItems = [\n      'Постоянно находится в тревоге или внутренней мобилизации',\n      'Не может расслабиться, даже когда внешне всё благополучно',\n      'Устал жить в режиме выживания',\n      'Замечает, что тело всё чаще говорит через напряжение, заболевания, бессонницу, усталость и другие симптомы',\n      'Хочет вернуть ощущение безопасности в собственном теле',\n      'Уже многое перепробовал(а), а состояние почти не меняется'\n    ];\n\n    const triggerItems = [\n      'Не получается расслабиться, даже если всё вроде хорошо',\n      'Тело постоянно находится в напряжении',\n      'Мысли не останавливаются ни днём, ни ночью',\n      'Приходится всё время быть начеку и всё контролировать',\n      'Отдых не приносит ощущения, что силы вернулись',\n      'Сложно уснуть, или сон не даёт восстановления',\n      'Кажется, что живёшь на автомате и всё время куда-то бежишь',\n      'Ничего не радует, жизнь ощущается как бесконечное преодоление',\n      'Тело всё чаще напоминает о себе болью, болезнями, напряжением или другими симптомами'\n    ];\n\n    const caQuotes = [\n      '«Я уже реально не понимаю, где заканчивается моё \"я устала\" и начинается нормальная реакция человека на жизнь»',\n      '«Просто внутреннее напряжение, которое сильно давит в тело, особенно в шею, спину, голову»',\n      '«Магний, глицин, прогулка перед сном, цифровой детокс, травяной чай, горячий душ, режим — и вот это всё не помогает. Оно не работает»',\n      '«Кто-нибудь знает, как расслабиться? Прям вот полностью расслабиться и отдохнуть?»',\n      '«Если сейчас хорошо, потом будет плохо»',\n      '«Я не могу спокойно сидеть без дела. Мне постоянно надо что-то делать»',\n      '«Как взрастить в себе чувство опоры? Где искать её? Почему так сложно подойти к себе и говорить \"нет\"?»',\n      '«Честно, я так устала. Будто потеряла себя где-то по дороге»',\n      '«Мне просто нужно, чтобы кто-то взял на себя все вопросы, хотя бы на неделю-две. Мне бы сохраниться»'\n    ];\n\n    const formatSteps = [\n      { n: '1', title: 'Запись', desc: 'Согласовываем удобное время встречи и коротко обсуждаем запрос, чтобы понять, с чем человек приходит и как лучше организовать работу.' },\n      { n: '2', title: 'Начало сеанса', desc: 'Подробно разбираем, что сейчас происходит с человеком — не только сам запрос, но и его состояние. Определяем, с чем именно будем работать.' },\n      { n: '3', title: 'Очный сеанс', desc: 'Человек находится в кабинете и лежит на кушетке.' },\n      { n: '4', title: 'Дистанционный сеанс', desc: 'Человек находится у себя дома или в другом спокойном месте, где его никто не будет отвлекать. Важно иметь возможность удобно лечь и провести всё время сеанса спокойно.' },\n      { n: '5', title: 'Завершение и сопровождение', desc: 'После сеанса обсуждаем изменения и ощущения. В течение недели остаёмся на связи, отслеживаем состояние и при необходимости даём рекомендации.' }\n    ];\n\n    const consequences = [\n      'Организм однажды просто ляжет либо в депрессию, либо в больничку.',\n      'Постоянный контроль станет образом жизни — вы будете всё меньше доверять себе, людям и жизни.',\n      'Страх начнёт диктовать решения: всё чаще захочется отказаться от поездок, встреч и перемен, потому что так спокойнее.',\n      'Отношения с близкими могут начать разрушаться — напряжение, раздражительность и желание всё контролировать отдаляют людей друг от друга.',\n      'Работа перестанет приносить удовлетворение — организм больше не сможет выдерживать привычную нагрузку.',\n      'Тело будет всё громче требовать внимания: бессонница, боль, усталость, новые симптомы, походы по врачам без диагнозов.',\n      'Мир постепенно станет меньше — вместо жизни останется только попытка удержать всё под контролем и пережить очередной день.',\n      'Самое опасное — привыкнуть к этому состоянию настолько, что оно начнёт казаться нормальной жизнью.'\n    ];\n\n    const futureItems = [\n      'Вы просыпаетесь утром и не прислушиваетесь к себе в поисках новой боли',\n      'Вам больше не нужно всё контролировать, чтобы чувствовать себя в безопасности',\n      'Вы можете отдыхать без чувства вины',\n      'Вы перестаёте жить в ожидании следующей проблемы',\n      'У вас появляются силы строить планы, мечтать, любить, работать, путешествовать, смеяться',\n      'Жизнь перестаёт быть выживанием и снова становится жизнью',\n      'Тело перестаёт быть источником постоянной тревоги и снова становится местом, в котором спокойно жить',\n      'Вы можете просто жить, а не всё время справляться',\n      'У вас появляется ощущение, что впереди — жизнь, а не очередной день, который нужно пережить',\n      'Вас ждут профессиональные достижения'\n    ];\n\n    const resultQuotes = [\n      '«Я даже не понимала, насколько сильно устала»',\n      '«Я так не высыпалась уже несколько лет»',\n      '«Впервые за долгое время проснулась без внутреннего напряжения»',\n      '«У меня стало меньше страхов»',\n      '«Появилось чувство безопасности»',\n      '«На душе стало спокойно»',\n      '«Я выхожу из дома без страха и без волнения»',\n      '«Боль уменьшилась или совсем ушла»',\n      '«У меня расслабилась челюсть»',\n      '«В голове стало яснее, стало легче думать»',\n      '«Появилось чувство уверенности»',\n      '«Я лучше слышу себя и понимаю, чего хочу»',\n      '«Вернулся контакт с собой»',\n      '«Как будто больше не нужно всё время куда-то бежать»',\n      '«Я перестала кричать на детей»'\n    ];\n\n    const caseQuotes = [\n      '«Мне было очень комфортно на сеансе. Я заметила изменения уже после первой встречи. Боль в ноге, с которой я пришла, ушла».',\n      '«Я пришла с ребёнком и увидела, как проходит работа. Мне очень понравился подход — спокойно, внимательно, без спешки».',\n      '«Сеанс превзошёл все мои ожидания. Я не думала, что можно настолько глубоко расслабиться. После него я почувствовала спокойствие, которого у меня давно не было».'\n    ];\n\n    const objectionsData = [\n      { q: '«Я уже столько всего перепробовала, и ничего не помогает»', a: 'Биодинамика работает не с симптомом напрямую, а помогает нервной системе выйти из хронического режима мобилизации — поэтому эффект часто заметен там, где другие способы не срабатывали.' },\n      { q: '«Я не понимаю, что такое биодинамика»', a: 'Это направление выросло из классической остеопатии и краниосакральной терапии: специалист очень мягким, почти неощутимым касанием помогает телу самому найти точки избыточного напряжения и расслабиться. Разбираемся подробно на первом сеансе.' },\n      { q: '«Если я просто буду лежать, как вообще может что-то измениться?»', a: 'Работа опирается на естественную способность тела к саморегуляции: в спокойном, безопасном положении нервная система получает возможность «выключить» постоянную мобилизацию — в этом и есть терапевтический эффект.' },\n      { q: '«Вдруг это опять окажется пустой тратой денег?»', a: 'Многие клиенты замечают изменения уже после первого сеанса. Если что-то будет непонятно или неощутимо — это тоже обсуждается в процессе.' },\n      { q: '«Мне кажется, со мной уже ничего не поможет»', a: 'Это частое ощущение при хронической усталости и напряжении. Работа устроена так, чтобы бережно, шаг за шагом возвращать телу способность отдыхать.' },\n      { q: '«Я боюсь, что ничего не почувствую»', a: 'Это нормально и не мешает работе: у метода мягкое, почти неуловимое воздействие, а изменения часто проявляются постепенно — иногда через день-два после сеанса, а не во время него.' },\n      { q: '«Я не уверена, что проблема вообще в теле»', a: 'Нервная система и тело напрямую связаны с тревогой и хроническим напряжением, поэтому работа с телом часто даёт результат даже там, где причина кажется «в голове».' },\n      { q: '«Мне страшно довериться незнакомому специалисту»', a: 'Первый сеанс всегда начинается с разговора о запросе — вы сами определяете темп и глубину работы.' }\n    ];\n\n    const faqData = [\n      { q: 'Что такое биодинамика?', a: 'Мягкое телесно-ориентированное направление, выросшее из классической остеопатии и краниосакральной терапии (основоположник — Уильям Сазерленд, продолжено Роллином Беккером). Специалист работает с очень тонкими ритмами и тканями тела, помогая нервной системе выйти из постоянного напряжения и восстановить естественную способность к саморегуляции.' },\n      { q: 'Чем биодинамика отличается от остеопатии?', a: 'Биодинамика — более мягкое, «энергетическое» направление внутри остеопатии: вместо активных манипуляций специалист работает с собственными организующими силами тела, практически без давления и техники вправления.' },\n      { q: 'Что происходит во время сеанса?', a: 'Человек лежит на кушетке (очно) или в спокойном месте у себя дома (дистанционно), специалист мягко, почти без физического воздействия сопровождает процессы, которые происходят в теле.' },\n      { q: 'Что я буду чувствовать?', a: 'Ощущения индивидуальны: от глубокого расслабления, тепла и лёгкого покалывания до сонливости. Некоторые ничего не чувствуют во время сеанса, а замечают изменения позже — это тоже нормально.' },\n      { q: 'Нужно ли специально готовиться?', a: 'Специальная подготовка не требуется. Достаточно выбрать спокойное время, когда вас никто не будет отвлекать.' },\n      { q: 'Сколько сеансов обычно нужно?', a: 'Это обсуждается индивидуально и зависит от запроса и состояния. Некоторые замечают изменения уже после первого сеанса, кому-то нужно несколько встреч.' },\n      { q: 'Можно ли работать дистанционно?', a: 'Да, дистанционный формат работает по тому же принципу, что и очный — важно только удобно расположиться в тихом, спокойном месте.' },\n      { q: 'Можно ли совмещать сеансы с работой с психологом или другими специалистами?', a: 'Да, биодинамика хорошо сочетается с психотерапией и другими видами поддержки и не заменяет медицинское лечение при серьёзных диагнозах, а дополняет его.' },\n      { q: 'Можно ли прийти без конкретного запроса?', a: 'Да — в начале сеанса мы вместе разбираемся, что сейчас происходит и с чем стоит работать.' },\n      { q: 'Что делать, если я ничего не почувствую во время сеанса?', a: 'Это не мешает процессу — изменения нередко проявляются постепенно, уже после сеанса, а не во время него.' }\n    ];\n\n    const objections = objectionsData.map((o, i) => ({\n      ...o,\n      open: !!this.state.objOpen[i],\n      sign: this.state.objOpen[i] ? '–' : '+',\n      toggle: () => this.toggleObj(i)\n    }));\n\n    const faqs = faqData.map((o, i) => ({\n      ...o,\n      open: !!this.state.faqOpen[i],\n      sign: this.state.faqOpen[i] ? '–' : '+',\n      toggle: () => this.toggleFaq(i)\n    }));\n\n    return {\n      btnBg, tagBg, tagText, quoteBorder, consequencesSectionStyle, consequenceItemStyle, showCases,\n      forWhomItems, triggerItems, caQuotes, formatSteps, consequences,\n      futureItems, resultQuotes, caseQuotes, objections, faqs\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
